version: 2

models:
  - name: int_address__enriched
    description: |
      **Silver Layer** — Enriched address model that joins CustomerAddress with
      Territory and TerritoryRegion lookups to produce clean, human-readable address attributes.

      Converted from the `#TempAddress` temp table logic inside `dbo.usp_PopulateDimAddress`.

      Key transformations:
      - NULL address fields are defaulted to 'N/A' via COALESCE
      - Territory descriptions with value 'Data Error' are excluded via NULLIF and replaced with 'N/A'
      - Surrogate key `address_key` generated via `create_key_from_source_id` macro (SHA1-based)
      - `hash_key` generated via `get_hash_dim_address` macro (SHA2_512) for change detection
      - A static **unknown/default member row** (source_address_id = NULL) is appended via UNION ALL
        to handle orphaned foreign key references in fact tables
      - Schema drift columns `address_type` and `is_primary` passed through from bronze;
        default row receives NULL values with explicit typing

      Materialized as a `table` (promoted from view for performance — avoids re-evaluating
      joins and hash computation on every downstream reference).
    columns:
      - name: address_key
        description: "Surrogate key — generated by hashing the source address ID via SHA1. BIGINT equivalent."
        tests:
          - not_null
      - name: source_address_id
        description: "Original CustomerAddress.Id from SQL Server source. NULL for the default unknown member row."
      - name: customer_address1
        description: "Address line 1 (LINE1). Defaults to 'N/A' if NULL in source."
        tests:
          - not_null
      - name: customer_address2
        description: "Address line 2 (LINE2). Defaults to 'N/A' if NULL in source."
        tests:
          - not_null
      - name: country
        description: |
          Country name resolved from Territory_lu.Description.
          'Data Error' values are replaced with 'N/A' via NULLIF logic.
          Defaults to 'N/A' for unmatched or invalid territory references.
        tests:
          - not_null
      - name: region
        description: "Region resolved from TerritoryRegion_lu.Description. Defaults to 'N/A' if no region linked."
        tests:
          - not_null
      - name: city
        description: "City / locality from LINE3. Defaults to 'N/A' if NULL."
        tests:
          - not_null
      - name: post_code
        description: "Postal code from LINE6. Defaults to 'N/A' if NULL."
        tests:
          - not_null
      - name: hash_key
        description: |
          SHA2_512 hash of all dimension attributes (address_key, source_address_id,
          customer_address1, customer_address2, country, region, city, post_code).
          Used by dim_address for change detection — a changed hash triggers an UPDATE in the MERGE.
        tests:
          - not_null
      - name: address_type
        description: "Address type passed from bronze (schema drift column). NULL for the unknown member row."
        tests:
          - accepted_values:
              values: ['Billing', 'Shipping', 'Both']
              config:
                where: "address_type IS NOT NULL"
      - name: is_primary
        description: "Primary address flag from bronze (schema drift column). NULL for the unknown member row."
